<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PORTFOLIO_GENERATOR — Build Aman Story</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Marked.js for Markdown -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <!-- Our Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

  <!-- ========== TOP BAR ========== -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-layer-group"></i></div>
      PORTFOLIO-GENERATOR.O
    </div>

    <div class="topbar-controls">

      <!-- Theme Switcher -->
      <div class="theme-pills">
        <button class="theme-pill active" onclick="setTheme('dark', this)">Dark</button>
        <button class="theme-pill" onclick="setTheme('light', this)">Light</button>
        <button class="theme-pill" onclick="setTheme('gradient', this)">Gradient</button>
        <button class="theme-pill" onclick="setTheme('developer', this)">Dev</button>
      </div>

      <!-- Layout Switcher -->
      <div class="layout-pills">
        <button class="layout-pill active" onclick="setLayout('card', this)" title="Card Layout">
          <i class="fas fa-th-large"></i>
        </button>
        <button class="layout-pill" onclick="setLayout('timeline', this)" title="Timeline Layout">
          <i class="fas fa-stream"></i>
        </button>
        <button class="layout-pill" onclick="setLayout('bars', this)" title="Skill Bars">
          <i class="fas fa-bars-progress"></i>
        </button>
      </div>

      <!-- Export Dropdown -->
      <div class="dropdown">
        <button class="btn" onclick="toggleDropdown()">
          <i class="fas fa-download"></i> Export
          <i class="fas fa-chevron-down" style="font-size:10px"></i>
        </button>
        <div class="dropdown-menu" id="exportMenu">
          <div class="dropdown-item" onclick="downloadHTML()">
            <i class="fas fa-code"></i> Download HTML
          </div>
          <div class="dropdown-item" onclick="exportJSON()">
            <i class="fas fa-file-code"></i> Export JSON
          </div>
          <div class="dropdown-item" onclick="copyEmbed()">
            <i class="fas fa-link"></i> Copy Data Link
          </div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="downloadHTML()">
        <i class="fas fa-rocket"></i> Launch
      </button>
    </div>
  </header>

  <!-- ========== SPLIT LAYOUT ========== -->
  <main class="split">

    <!-- ===== LEFT: EDITOR PANEL ===== -->
    <section class="editor-panel" id="editorPanel">

      <!-- Identity Section -->
      <div class="form-card">
        <div class="section-header">
          <i class="fas fa-user"></i> Identity
        </div>

        <!-- Avatar Upload -->
        <div class="avatar-upload">
          <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarInput').click()">
            <span id="avatarInitial">?</span>
          </div>
          <input type="file" id="avatarInput" accept="image/*" onchange="handleAvatar(event)">
          <div class="avatar-info">
            <button class="btn" onclick="document.getElementById('avatarInput').click()">
              <i class="fas fa-upload"></i> Upload Photo
            </button>
            <p>JPG, PNG or WebP · Max 5MB</p>
          </div>
        </div>

        <div class="field">
          <label for="inp_name">Full Name</label>
          <input type="text" id="inp_name" placeholder="Ada Lovelace" oninput="updatePreview()">
        </div>

        <div class="field">
          <label for="inp_role">Role / Title</label>
          <input type="text" id="inp_role" placeholder="Full-Stack Developer" oninput="updatePreview()">
        </div>

        <div class="field">
          <label for="inp_email">Email</label>
          <input type="email" id="inp_email" placeholder="ada@example.com" oninput="updatePreview()">
        </div>

        <div class="field">
          <label for="inp_bio">Bio</label>
          <textarea id="inp_bio" placeholder="Tell your story..." oninput="updatePreview()"></textarea>
        </div>

        <div class="field">
          <label for="inp_location">Location</label>
          <input type="text" id="inp_location" placeholder="San Francisco, CA" oninput="updatePreview()">
        </div>
      </div>

      <!-- Color Palette -->
      <div class="form-card">
        <div class="section-header">
          <i class="fas fa-palette"></i> Color Palette
        </div>
        <div class="color-row">
          <div class="color-swatch-wrap">
            <input type="color" id="col_accent" value="#6c63ff" oninput="updateColors()">
            <span>Primary</span>
          </div>
          <div class="color-swatch-wrap">
            <input type="color" id="col_accent2" value="#ff6584" oninput="updateColors()">
            <span>Accent</span>
          </div>
          <div class="color-swatch-wrap">
            <input type="color" id="col_bg" value="#0a0a0f" oninput="updateColors()">
            <span>Background</span>
          </div>
          <div class="color-swatch-wrap">
            <input type="color" id="col_text" value="#e8e8f0" oninput="updateColors()">
            <span>Text</span>
          </div>
          <button class="btn btn-icon" onclick="resetColors()" title="Reset Colors">
            <i class="fas fa-rotate-left"></i>
          </button>
        </div>
      </div>

      <!-- Skills Section -->
      <div class="form-card">
        <div class="section-header">
          <i class="fas fa-code"></i> Skills
        </div>
        <div class="skill-input-row">
          <input type="text" id="skillInput" placeholder="e.g. React, Python, Figma"
            onkeydown="if(event.key==='Enter') addSkill()">
          <select id="skillLevel">
            <option value="expert">Expert</option>
            <option value="advanced" selected>Advanced</option>
            <option value="intermediate">Intermediate</option>
            <option value="beginner">Beginner</option>
          </select>
        </div>
        <div class="skills-grid" id="skillsContainer"></div>
        <button class="add-btn" onclick="addSkill()">
          <i class="fas fa-plus"></i> Add Skill
        </button>
      </div>

      <!-- Projects Section -->
      <div class="form-card">
        <div class="section-header">
          <i class="fas fa-folder-open"></i> Projects
        </div>
        <div id="projectsContainer"></div>
        <button class="add-btn" onclick="addProject()">
          <i class="fas fa-plus"></i> Add Project
        </button>
      </div>

      <!-- Experience Section -->
      <div class="form-card">
        <div class="section-header">
          <i class="fas fa-briefcase"></i> Experience
        </div>
        <div id="experienceContainer"></div>
        <button class="add-btn" onclick="addExperience()">
          <i class="fas fa-plus"></i> Add Experience
        </button>
      </div>

      <!-- Social Links -->
      <div class="form-card">
        <div class="section-header">
          <i class="fas fa-share-nodes"></i> Social Links
        </div>
        <div class="social-grid">
          <div class="social-row">
            <div class="social-icon social-github"><i class="fab fa-github"></i></div>
            <input type="url" id="inp_github" placeholder="https://github.com/username" oninput="updatePreview()">
          </div>
          <div class="social-row">
            <div class="social-icon social-linkedin"><i class="fab fa-linkedin"></i></div>
            <input type="url" id="inp_linkedin" placeholder="https://linkedin.com/in/username" oninput="updatePreview()">
          </div>
          <div class="social-row">
            <div class="social-icon social-twitter"><i class="fab fa-twitter"></i></div>
            <input type="url" id="inp_twitter" placeholder="https://twitter.com/username" oninput="updatePreview()">
          </div>
          <div class="social-row">
            <div class="social-icon social-website"><i class="fas fa-globe"></i></div>
            <input type="url" id="inp_website" placeholder="https://yoursite.com" oninput="updatePreview()">
          </div>
        </div>
      </div>

      <!-- Spacer at bottom -->
      <div style="height: 20px;"></div>

    </section><!-- end editor-panel -->

    <!-- ===== RIGHT: PREVIEW PANEL ===== -->
    <section class="preview-panel">
      <div class="preview-toolbar">
        <div class="preview-label">Live Preview</div>
        <button class="btn btn-icon" onclick="downloadHTML()" title="Download">
          <i class="fas fa-download"></i>
        </button>
      </div>
      <!-- Portfolio output renders here -->
      <div id="portfolioPreview"></div>
    </section>

  </main><!-- end split -->

  <!-- Toast Notifications -->
  <div id="toastContainer"></div>

  <!-- Our Custom JavaScript -->
  <script src="script.js"></script>

</body>
</html>
